<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>プライバシーポリシー — WalkCook</title>
  <meta name="description" content="WalkCook プライバシーポリシー / Privacy Policy" />
  <style>
    :root {
      --orange: #E8621A;
      --yellow: #F5C342;
      --white: #FFFFFF;
      --light: #FFF8F0;
      --gray: #6B6B6B;
      --text: #1A1A1A;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #f0e8dc;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5%;
      height: 60px;
      z-index: 100;
    }
    .nav-logo {
      font-size: 1.25rem;
      font-weight: 800;
      text-decoration: none;
    }
    .nav-logo span.w { color: var(--orange); }
    .nav-logo span.c { color: var(--yellow); }
    .lang-btn {
      background: none;
      border: 1.5px solid var(--orange);
      color: var(--orange);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .lang-btn:hover { background: var(--orange); color: #fff; }

    /* ── HEADER ── */
    .page-header {
      background: var(--light);
      text-align: center;
      padding: 60px 5% 48px;
    }
    .page-header h1 {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 900;
      color: var(--orange);
    }
    .page-header p {
      margin-top: 10px;
      font-size: 0.9rem;
      color: var(--gray);
    }

    /* ── CONTENT ── */
    .content {
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 5% 80px;
    }
    .content section {
      margin-bottom: 44px;
    }
    .content h2 {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--orange);
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 2px solid var(--light);
    }
    .content p {
      font-size: 0.95rem;
      color: var(--gray);
      line-height: 1.85;
      margin-bottom: 10px;
    }
    .content p:last-child { margin-bottom: 0; }
    .content ul {
      list-style: none;
      padding: 0;
    }
    .content ul li {
      font-size: 0.95rem;
      color: var(--gray);
      line-height: 1.85;
      padding-left: 1.2em;
      position: relative;
    }
    .content ul li::before {
      content: "•";
      position: absolute;
      left: 0;
      color: var(--yellow);
      font-weight: 700;
    }

    /* ── FOOTER ── */
    footer {
      padding: 36px 5%;
      text-align: center;
      font-size: 0.85rem;
      color: var(--gray);
      border-top: 1px solid #f0e8dc;
    }
    footer a { color: var(--orange); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="index.html">
    <span class="w">Walk</span><span class="c">Cook</span>
  </a>
  <button class="lang-btn" id="langBtn" onclick="toggleLang()">English</button>
</nav>

<!-- HEADER -->
<div class="page-header">
  <h1 id="pageTitle">プライバシーポリシー</h1>
  <p id="pageDate">最終更新日：2026年4月21日</p>
</div>

<!-- CONTENT -->
<main class="content" id="contentArea">
</main>

<!-- FOOTER -->
<footer id="footerText">
  <p>© 2026 WalkCook · <a href="index.html" id="topLink">トップへ戻る</a> · <a href="mailto:usatanlab@gmail.com">お問い合わせ</a></p>
</footer>

<script>
  const sections = {
    ja: [
      {
        h: "はじめに",
        p: ["本プライバシーポリシーは、WalkCook（以下「本アプリ」）における個人情報の取り扱いについて説明します。本アプリをご利用いただく前に、本ポリシーをよくお読みください。"]
      },
      {
        h: "取得する情報",
        ul: [
          "歩数・消費カロリー・アクティビティデータ（HealthKit 経由）",
          "アプリ内での目標設定・進捗データ（端末内にのみ保存）",
          "クラッシュログ・パフォーマンスデータ（匿名）"
        ]
      },
      {
        h: "HealthKit データの取り扱い",
        p: [
          "本アプリは Apple HealthKit を通じて歩数・消費カロリーなどの健康データを読み取ります。",
          "取得した健康データは、食材ドロップおよびゲーム進捗の計算にのみ使用します。",
          "HealthKit から取得したデータを外部サーバーへ送信したり、第三者に提供したりすることは一切ありません。",
          "HealthKit データを広告・マーケティング目的に使用することはありません。"
        ]
      },
      {
        h: "データの保存場所",
        p: ["ゲームの進捗・レシピコレクション・目標設定などのデータはすべてお使いの端末内に保存されます。外部サーバーへの送信は行いません。"]
      },
      {
        h: "第三者へのデータ提供",
        p: ["法令に基づく場合を除き、取得した情報を第三者に提供・販売・貸与することはありません。"]
      },
      {
        h: "子どものプライバシー",
        p: ["本アプリは13歳未満のお子様を対象としていません。意図せず13歳未満の方の情報を取得した場合は、速やかに削除します。"]
      },
      {
        h: "ポリシーの変更",
        p: ["本ポリシーは必要に応じて更新されることがあります。重要な変更がある場合はアプリ内またはこのページでお知らせします。"]
      },
      {
        h: "お問い合わせ",
        p: ['プライバシーに関するご質問は <a href="mailto:usatanlab@gmail.com" style="color:var(--orange)">usatanlab@gmail.com</a> までご連絡ください。']
      }
    ],
    en: [
      {
        h: "Introduction",
        p: ["This Privacy Policy describes how WalkCook (&ldquo;the App&rdquo;) handles your information. Please read this policy carefully before using the App."]
      },
      {
        h: "Information We Collect",
        ul: [
          "Step count, calories burned, and activity data (via HealthKit)",
          "In-app goal settings and progress data (stored on-device only)",
          "Anonymous crash logs and performance diagnostics"
        ]
      },
      {
        h: "How We Use HealthKit Data",
        p: [
          "The App reads step count, calories burned, and related health data through Apple HealthKit.",
          "Health data is used solely to calculate ingredient drops and game progress.",
          "We never transmit HealthKit data to external servers or share it with third parties.",
          "HealthKit data is never used for advertising or marketing purposes."
        ]
      },
      {
        h: "Data Storage",
        p: ["All game progress, recipe collections, and goal settings are stored locally on your device. No data is sent to external servers."]
      },
      {
        h: "Sharing of Information",
        p: ["We do not sell, trade, or transfer your information to third parties, except as required by law."]
      },
      {
        h: "Children's Privacy",
        p: ["The App is not directed at children under 13. If we become aware that we have inadvertently collected information from a child under 13, we will delete it promptly."]
      },
      {
        h: "Changes to This Policy",
        p: ["This policy may be updated from time to time. Material changes will be communicated through the App or this page."]
      },
      {
        h: "Contact Us",
        p: ['For privacy-related inquiries, please contact us at <a href="mailto:usatanlab@gmail.com" style="color:var(--orange)">usatanlab@gmail.com</a>.']
      }
    ]
  };

  const meta = {
    ja: {
      btn: "English",
      title: "プライバシーポリシー",
      date: "最終更新日：2026年4月21日",
      footer: '© 2026 WalkCook · <a href="index.html">トップへ戻る</a> · <a href="mailto:usatanlab@gmail.com">お問い合わせ</a>'
    },
    en: {
      btn: "日本語",
      title: "Privacy Policy",
      date: "Last updated: April 21, 2026",
      footer: '© 2026 WalkCook · <a href="index.html">Back to top</a> · <a href="mailto:usatanlab@gmail.com">Contact</a>'
    }
  };

  let lang = "ja";

  function render() {
    const m = meta[lang];
    document.documentElement.lang = lang;
    document.getElementById("langBtn").textContent = m.btn;
    document.getElementById("pageTitle").textContent = m.title;
    document.getElementById("pageDate").textContent = m.date;
    document.getElementById("footerText").innerHTML = `<p>${m.footer}</p>`;

    const area = document.getElementById("contentArea");
    area.innerHTML = sections[lang].map(s => {
      let body = "";
      if (s.p) body += s.p.map(t => `<p>${t}</p>`).join("");
      if (s.ul) body += `<ul>${s.ul.map(i => `<li>${i}</li>`).join("")}</ul>`;
      return `<section><h2>${s.h}</h2>${body}</section>`;
    }).join("");
  }

  function toggleLang() {
    lang = lang === "ja" ? "en" : "ja";
    render();
  }

  render();
</script>

</body>
</html>
